version: "3.9"
networks:
  digitalgraduate-dev:
    driver: bridge
services:
  app: 
    container_name: digitalgraduate
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    networks:
      - digitalgraduate
    depends_on:
      - postgres_db
  postgres_db:
    container_name: postgres
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 260401
      POSTGRES_DB: dbfortests
    ports:
      - "5432:5432"
    networks:
      - digitalgraduate-dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data: